apiVersion: v1
kind: ServiceAccount
metadata:
  name: kost
  namespace: kost
---
apiVersion: rbac.authorization.k8s.io/v1
kind: ClusterRole
metadata:
  name: kost
rules:
  # Read pod resource usage (Metrics API)
  - apiGroups: ["metrics.k8s.io"]
    resources: ["pods"]
    verbs: ["get", "list"]
  # Read workload specs for request/limit values
  - apiGroups: [""]
    resources: ["pods"]
    verbs: ["get", "list", "watch"]
  # Read node info for context (future pricing extensions)
  - apiGroups: [""]
    resources: ["nodes", "persistentvolumeclaims"]
    verbs: ["get", "list"]
---
apiVersion: rbac.authorization.k8s.io/v1
kind: ClusterRoleBinding
metadata:
  name: kost
roleRef:
  apiGroup: rbac.authorization.k8s.io
  kind: ClusterRole
  name: kost
subjects:
  - kind: ServiceAccount
    name: kost
    namespace: kost
